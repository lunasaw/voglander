# application-lab.yml —— GB28181 协议验证台专用 profile
# 启动命令：mvn spring-boot:run -pl voglander-web -Dspring-boot.run.profiles=dev,repo,inte,lab
# lab 覆盖 inte 中 local.sip.* 的默认值，开启同进程 SIP 自环
local:
  sip:
    enable: true
    server:
      enabled: true
      ip: 127.0.0.1
      port: 5060
      serverId: 34020000002000000001
      domain: 34020000002000000001
    client:
      enabled: true
      clientId: 34020000001320000001   # 设备编码（左），与 serverId 不同（自环路由前提）
      ip: 127.0.0.1                    # 同时决定客户端监听点绑定地址（domain←此值）
      port: 5061
      realm: 34020000
      password: "123456"
      registerExpires: 3600
  gateway:
    node-id: node-lab
    gb28181:
      store:
        type: memory                   # 单机自环使用内存 InviteContextStore

voglander:
  protocol-lab:
    enabled: true                      # 激活 LabClientController + Lab*Listener，互斥级联 QueryHandler
    push:
      ffmpeg-path: /usr/bin/ffmpeg   # ffmpeg 可执行文件绝对路径（按机器改）
      media-file: src/main/resources/files/invite.mp4   # 待推视频文件相对路径（模块视角）
      auto: true                           # 收到 INVITE 自动起 ffmpeg（闭环无时序压力）
      loop: true                           # 循环推流，便于长联调
      transcode: true                      # mp4 源转码 libx264 封 TS 最稳（auto 插 h264_mp4toannexb）；确认封装兼容可设 false 走 copy
      media-ip: 127.0.0.1                  # 设备应答 SDP 媒体 IP；自环=本机
      # allowed-root:                      # 可选：推流文件白名单根目录（路径穿越防护）
      zlm-host: http://127.0.0.1:8082      # ZLM HTTP API 地址（对应 config.ini [http] port=8082）
      zlm-secret: zlm                      # ZLM API secret（对应 config.ini [api] secret=zlm）
  event:
    shard:
      enabled: true
