spring:
  # 缓存配置：启用 Redis 动态缓存管理器（RedisConfig#redisCacheManager 受此开关激活）。
  # 缺失此项时，sip-common 的 @ConditionalOnMissingBean ConcurrentMapCacheManager（非动态，
  # 仅含固定 4 个缓存区）会成为唯一 CacheManager，导致 voglander 自有缓存区 device/mediaNode/...
  # getCache 恒返回 null（"Cannot find cache named 'device'"），并静默关闭延迟双删扫描。
  cache:
    type: redis
  datasource:
    dynamic:
      primary: master #设置默认的数据源或者数据源组,默认值即为master
      strict: false #严格匹配数据源,默认false. true未匹配到指定数据源时抛异常,false使用默认数据源
      datasource:
        master:
          type: com.zaxxer.hikari.HikariDataSource
          #          driver-class-name: com.mysql.cj.jdbc.Driver
          #          url: jdbc:mysql://127.0.0.1:3306/voglander?allowPublicKeyRetrieval=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai
          #          username: root
          #          password: root
          # PostgreSQL 配置示例（取消注释并修改连接信息）
          #          driver-class-name: org.postgresql.Driver
          #          url: jdbc:postgresql://localhost:5432/voglander?serverTimezone=Asia/Shanghai
          #          username: postgres
          #          password: your_password
          driver-class-name: org.sqlite.JDBC
          url: jdbc:sqlite:app.db?journal_mode=WAL&busy_timeout=5000

# hikari 线程池
    hikari:
      max-lifetime: 1800000
      connection-timeout: 5000
      idle-timeout: 3600000
      connection-test-query: /**SELECT 1*/
      maximum-pool-size: 20
      minimum-idle: 10

# redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:  # Redis 没有密码，留空
      client-name: voglander
      database: 0
      # 注意：无单位的纯数字会被 Spring 解析为毫秒。曾误写 30(=30ms) 导致 KEYS/ZRANGEBYSCORE 命令超时
      timeout: 3s
      connect-timeout: 10s


# mybatis-plus
mybatis-plus:
  check-config-location: true
  configuration:
    cache-enabled: true # 开启缓存
    use-generated-keys: true # 开启自动生成主键
    default-executor-type: simple # 默认执行器类型
    map-underscore-to-camel-case: true # 开启驼峰命名
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
