spring:
  application:
    name: voglander
  profiles:
    active: dev,repo,inte

logging:
  config: classpath:log/logback-spring.xml
  level:
    root: INFO

server:
  port: 8081

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls-primary-name: default
    deep-linking: true
    display-extensions: true
    display-operation-id: true
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    disable-swagger-default-url: true
    url: /v3/api-docs
  group-configs:
    - group: 'default'
      display-name: '默认'
      paths-to-match: '/**'

# 防止XSS攻击
xss:
  enabled: true
  excludes: /system/notice,/zlm/**,/index/hook/**,/swagger-ui/**,/v3/api-docs/**
  urlPatterns: /system/*,/monitor/*,/tool/*

# Actuator & Metrics (Stage G)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: voglander
      node-id: ${gateway.node-id:unknown}

